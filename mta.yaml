_schema-version: 3.3.0
ID: IncidentManagement
description: A simple CAP project.
version: 1.0.0
modules:
- name: IncidentManagement-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: IncidentManagement-db
  - name: incident-xsuaa
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: IncidentManagement-destination-content
  type: com.sap.application.content

  requires:
    - name: srv-api

    - name: IncidentManagement-destination-service
      parameters:
        content-target: true

    - name: IncidentManagement-repo-host
      parameters:
        service-key:
          name: IncidentManagement-html5-repo-host-key

    - name: incident-xsuaa
      parameters:
        service-key:
          name: IncidentManagement-xsuaa-key
  parameters:
    content:
      instance:
        existing_destinations_policy: update

        destinations:

          - Name: IncidentManagement-srv
            URL: ~{srv-api/srv-url}
            Authentication: OAuth2UserTokenExchange
            TokenServiceInstanceName: incident-xsuaa
            TokenServiceKeyName: IncidentManagement-xsuaa-key
            HTML5.ForwardAuthToken: true

          - Name: IncidentManagement-approuter_IncidentManagement_html_repo_host
            ServiceInstanceName: IncidentManagement-html5-service
            ServiceKeyName: IncidentManagement-html5-repo-host-key
            sap.cloud.service: IncidentManagement

          - Name: IncidentManagement-approuter_uaa_IncidentManagement
            Authentication: OAuth2UserTokenExchange
            ServiceInstanceName: incident-xsuaa
            ServiceKeyName: IncidentManagement-xsuaa-key
            sap.cloud.service: IncidentManagement
  build-parameters:
    no-source: true
- name: IncidentManagement-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: IncidentManagement-db
  parameters:
    buildpack: nodejs_buildpack
- name: IncidentManagement-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: IncidentManagement-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comamistaincidentmanagementincidentmanagement.zip
      name: comamistaincidentmanagementincidentmanagement
      target-path: resources/
- name: comamistaincidentmanagementincidentmanagement
  type: html5
  path: app/incidentmanagement
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: incident-xsuaa
  type: org.cloudfoundry.managed-service
  parameters:
    service: xsuaa
    service-plan: application
    path: xs-security.json
- name: IncidentManagement-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: IncidentManagement-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: IncidentManagement-html5-service
    service-plan: app-host
- name: IncidentManagement-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: IncidentManagement-destination-service
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
